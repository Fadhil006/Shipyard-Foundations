apiVersion: apps/v1
kind: Deployment
metadata:
  name: final-webapp-deployment
  labels:
    app: final-webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: final-webapp
  template:
    metadata:
      labels:
        app: final-webapp
    spec:
      containers:
      - name: webapp
        image: final-webapp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: STUDENT_NAME
          value: "Muhamed Fadhil"
